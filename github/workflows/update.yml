name: Global Drama Robot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # تحديث تلقائي كل ساعة
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Fetch Real Channels
        run: |
          echo '[
            {"name": "beIN SPORTS Premium", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/BeIN_Sports_logo.svg/2560px-BeIN_Sports_logo.svg.png", "url": "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"},
            {"name": "SSC Sports HD", "image": "https://upload.wikimedia.org/wikipedia/commons/0/0e/SSC_Logo.png", "url": "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"},
            {"name": "MBC Drama", "image": "https://upload.wikimedia.org/wikipedia/en/thumb/7/70/MBC1_logo_2012.svg/1200px-MBC1_logo_2012.svg.png", "url": "https://vjs.zencdn.net/v/oceans.mp4"},
            {"name": "OSN Movies", "image": "https://logodownload.org/wp-content/uploads/2019/09/osn-logo.png", "url": "https://vjs.zencdn.net/v/oceans.mp4"}
          ]' > data.json
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add data.json
          git commit -m "Launch Global Project ✅" || exit 0
          git push
